<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>MAYWEATHER</h1>
    <div class="container">
      <div class="search-weather">
        <div class="input-field">
          <input type="text" id="city-input" placeholder="Enter a city..." />
          <span class="error"></span>
        </div>
        <div>
          <button id="get-weather" type="button" name="get-weather">
            Get Weather
          </button>
        </div>
      </div>
      <div>
        <button id="toggle-unit" type="button" name="toggle-unit">
          Show in °F
        </button>
      </div>
      <div class="weather-container"></div>
    </div>
  </body>
</html>
